version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: iron-forge-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ironforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: iron-forge-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/ironforge?schema=public
      - JWT_SECRET=super_secret_key_iron_forge_123!
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: iron-forge-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/ironforge?schema=public
      - JWT_SECRET=super_secret_key_iron_forge_123!
    depends_on:
      - backend

volumes:
  pgdata:
